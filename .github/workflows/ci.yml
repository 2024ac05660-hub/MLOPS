name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ─────────────── Lint ───────────────
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install linting tools
        run: pip install flake8 black

      - name: Run flake8
        run: |
          flake8 src/ api/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --statistics

      - name: Check black formatting
        run: black --check --line-length 100 src/ api/ tests/

  # ─────────────── Unit Tests ───────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --ignore=tests/test_api.py \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────── Model Training ───────────────
  train:
    name: Model Training
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Preprocess data
        run: python src/data_processing.py

      - name: Train models
        run: python src/train.py

      - name: Verify model artifact exists
        run: |
          ls -lh models/best_model.pkl
          python -c "
          import pickle, sys
          with open('models/best_model.pkl','rb') as f:
              m = pickle.load(f)
          print('Model loaded successfully:', type(m).__name__)
          "

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/best_model.pkl
            models/model_meta.json

      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/

      - name: Upload training plots
        uses: actions/upload-artifact@v4
        with:
          name: training-plots
          path: screenshots/

  # ─────────────── Docker Build ───────────────
  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/

      - name: Build Docker image
        run: docker build -t heart-disease-api:ci .

      - name: Start container
        run: |
          docker run -d -p 8080:8080 \
            --name hd-api-test \
            heart-disease-api:ci
          sleep 5

      - name: Health check
        run: |
          curl -f http://localhost:8080/health || (docker logs hd-api-test && exit 1)

      - name: Predict smoke test
        run: |
          curl -s -X POST http://localhost:8080/predict \
            -H "Content-Type: application/json" \
            -d '{
              "age":55,"sex":1,"cp":4,"trestbps":140,"chol":217,
              "fbs":0,"restecg":2,"thalach":111,"exang":1,"oldpeak":5.6,
              "slope":3,"ca":0,"thal":7
            }' | python -m json.tool

      - name: Stop container
        run: docker stop hd-api-test && docker rm hd-api-test
